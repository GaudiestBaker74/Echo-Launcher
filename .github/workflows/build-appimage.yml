name: Build Multiplatform Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version/tag, e.g. v1.0.0"
        required: true
        default: "v1.0.0"
      prerelease:
        description: "Mark this release as pre-release"
        required: true
        type: boolean
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux-appimage:
    name: Build Linux AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y wget curl unzip tar file desktop-file-utils libfuse2 imagemagick

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build project
        run: |
          if [ -f "pom.xml" ]; then
            mvn clean package -DskipTests
            mvn dependency:copy-dependencies -DincludeScope=runtime -DoutputDirectory=target/dependency
          elif [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew build
          else
            echo "No pom.xml or gradlew found."
            exit 1
          fi

      - name: Locate launcher jar
        id: locate_jar
        run: |
          JAR_FILE=$(find . -type f -name "*.jar" \
            ! -path "./target/dependency/*" \
            ! -name "*sources*" \
            ! -name "*javadoc*" \
            ! -name "*original*" \
            | head -n 1)

          if [ -z "$JAR_FILE" ]; then
            echo "No launcher jar found."
            exit 1
          fi

          echo "Found jar: $JAR_FILE"
          echo "jar_file=$JAR_FILE" >> "$GITHUB_OUTPUT"

      - name: Prepare AppDir
        run: |
          APPDIR="EchoLauncher.AppDir"

          rm -rf "$APPDIR"

          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/lib"
          mkdir -p "$APPDIR/usr/lib/deps"
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          cp "${{ steps.locate_jar.outputs.jar_file }}" "$APPDIR/usr/lib/Echo_Launcher.jar"

          if [ -d "target/dependency" ]; then
            cp target/dependency/*.jar "$APPDIR/usr/lib/deps/" || true
          fi

          if [ -d "build/libs" ]; then
            find build/libs -type f -name "*.jar" \
              ! -name "*sources*" \
              ! -name "*javadoc*" \
              -exec cp {} "$APPDIR/usr/lib/deps/" \; || true
          fi

      - name: Download Linux Java Runtime
        run: |
          APPDIR="EchoLauncher.AppDir"

          mkdir -p runtime-download
          wget -O runtime-download/runtime.tar.gz \
            "https://api.adoptium.net/v3/binary/latest/21/ga/linux/x64/jre/hotspot/normal/eclipse"

          mkdir -p "$APPDIR/usr/lib/runtime-tmp"
          tar -xf runtime-download/runtime.tar.gz -C "$APPDIR/usr/lib/runtime-tmp"
          mv "$APPDIR/usr/lib/runtime-tmp"/* "$APPDIR/usr/lib/runtime"

          rm -rf "$APPDIR/usr/lib/runtime-tmp"
          rm -rf runtime-download

          "$APPDIR/usr/lib/runtime/bin/java" -version

      - name: Download Linux JavaFX SDK
        run: |
          APPDIR="EchoLauncher.AppDir"

          mkdir -p javafx-download
          wget -O javafx-download/javafx.zip \
            "https://download2.gluonhq.com/openjfx/21.0.2/openjfx-21.0.2_linux-x64_bin-sdk.zip"

          unzip javafx-download/javafx.zip -d javafx-download
          mkdir -p "$APPDIR/usr/lib/javafx"
          cp -r javafx-download/javafx-sdk-21.0.2/lib "$APPDIR/usr/lib/javafx/"
          rm -rf javafx-download

      - name: Add Linux icon
        run: |
          APPDIR="EchoLauncher.AppDir"

          if [ -f "docs/readme-assets/logo.png" ]; then
            cp docs/readme-assets/logo.png "$APPDIR/echo-launcher.png"
            cp docs/readme-assets/logo.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/echo-launcher.png"
          elif [ -f "src/main/resources/icons/minecraft-launcher.png" ]; then
            cp src/main/resources/icons/minecraft-launcher.png "$APPDIR/echo-launcher.png"
            cp src/main/resources/icons/minecraft-launcher.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/echo-launcher.png"
          else
            echo "No icon found. Creating placeholder icon."
            convert -size 256x256 xc:#2563eb "$APPDIR/echo-launcher.png"
            cp "$APPDIR/echo-launcher.png" "$APPDIR/usr/share/icons/hicolor/256x256/apps/echo-launcher.png"
          fi

      - name: Create Linux launcher script
        run: |
          APPDIR="EchoLauncher.AppDir"

          cat > "$APPDIR/usr/bin/echo-launcher" << 'EOF'
#!/bin/bash
HERE="$(dirname "$(readlink -f "$0")")"
APPDIR="$(dirname "$(dirname "$HERE")")"

JAVA="$APPDIR/usr/lib/runtime/bin/java"
JAR="$APPDIR/usr/lib/Echo_Launcher.jar"
DEPS="$APPDIR/usr/lib/deps/*"
JAVAFX="$APPDIR/usr/lib/javafx/lib"

exec "$JAVA" \
  --module-path "$JAVAFX" \
  --add-modules javafx.controls,javafx.fxml,javafx.web \
  -cp "$JAR:$DEPS" \
  launcher.Main "$@"
EOF

          chmod +x "$APPDIR/usr/bin/echo-launcher"

      - name: Create Linux AppRun
        run: |
          APPDIR="EchoLauncher.AppDir"

          cat > "$APPDIR/AppRun" << 'EOF'
#!/bin/bash
APPDIR="$(dirname "$(readlink -f "$0")")"
exec "$APPDIR/usr/bin/echo-launcher" "$@"
EOF

          chmod +x "$APPDIR/AppRun"

      - name: Create Linux desktop file
        run: |
          APPDIR="EchoLauncher.AppDir"

          cat > "$APPDIR/echo-launcher.desktop" << 'EOF'
[Desktop Entry]
Type=Application
Name=Echo Launcher
Exec=echo-launcher
Icon=echo-launcher
Categories=Game;
Terminal=false
EOF

          cp "$APPDIR/echo-launcher.desktop" "$APPDIR/usr/share/applications/echo-launcher.desktop"

      - name: Download appimagetool
        run: |
          wget -O appimagetool-x86_64.AppImage \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage

      - name: Build Linux AppImage
        run: |
          export ARCH=x86_64
          export APPIMAGE_EXTRACT_AND_RUN=1
          ./appimagetool-x86_64.AppImage EchoLauncher.AppDir Echo_Launcher-linux-x86_64.AppImage
          chmod +x Echo_Launcher-linux-x86_64.AppImage

      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: Echo_Launcher_Linux_AppImage
          path: Echo_Launcher-linux-x86_64.AppImage

  build-windows-portable:
    name: Build Windows Portable ZIP
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build project
        shell: pwsh
        run: |
          if (Test-Path "pom.xml") {
            mvn clean package -DskipTests
            mvn dependency:copy-dependencies -DincludeScope=runtime -DoutputDirectory=target/dependency
          } elseif (Test-Path "gradlew.bat") {
            .\gradlew.bat build
          } elseif (Test-Path "gradlew") {
            ./gradlew build
          } else {
            Write-Error "No pom.xml or gradlew found."
            exit 1
          }

      - name: Locate launcher jar
        id: locate_jar
        shell: pwsh
        run: |
          $jars = Get-ChildItem -Recurse -Filter "*.jar" |
            Where-Object {
              $_.FullName -notmatch "\\target\\dependency\\" -and
              $_.Name -notmatch "sources" -and
              $_.Name -notmatch "javadoc" -and
              $_.Name -notmatch "original"
            }

          if ($jars.Count -eq 0) {
            Write-Error "No launcher jar found."
            exit 1
          }

          $jar = $jars[0].FullName
          Write-Host "Found jar: $jar"
          "jar_file=$jar" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Prepare Windows portable directory
        shell: pwsh
        run: |
          $APPDIR = "EchoLauncher-Windows"

          if (Test-Path $APPDIR) {
            Remove-Item $APPDIR -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path "$APPDIR\app" | Out-Null
          New-Item -ItemType Directory -Force -Path "$APPDIR\app\deps" | Out-Null
          New-Item -ItemType Directory -Force -Path "$APPDIR\runtime" | Out-Null
          New-Item -ItemType Directory -Force -Path "$APPDIR\javafx" | Out-Null

          Copy-Item "${{ steps.locate_jar.outputs.jar_file }}" "$APPDIR\app\Echo_Launcher.jar"

          if (Test-Path "target\dependency") {
            Copy-Item "target\dependency\*.jar" "$APPDIR\app\deps\" -ErrorAction SilentlyContinue
          }

          if (Test-Path "build\libs") {
            Get-ChildItem "build\libs" -Filter "*.jar" |
              Where-Object {
                $_.Name -notmatch "sources" -and
                $_.Name -notmatch "javadoc"
              } |
              ForEach-Object {
                Copy-Item $_.FullName "$APPDIR\app\deps\" -ErrorAction SilentlyContinue
              }
          }

      - name: Download Windows Java Runtime
        shell: pwsh
        run: |
          $APPDIR = "EchoLauncher-Windows"

          New-Item -ItemType Directory -Force -Path "runtime-download" | Out-Null
          $runtimeZip = "runtime-download\runtime.zip"

          Invoke-WebRequest `
            -Uri "https://api.adoptium.net/v3/binary/latest/21/ga/windows/x64/jre/hotspot/normal/eclipse" `
            -OutFile $runtimeZip

          Expand-Archive -Path $runtimeZip -DestinationPath "runtime-download\extracted" -Force
          $root = Get-ChildItem "runtime-download\extracted" | Select-Object -First 1
          Copy-Item "$($root.FullName)\*" "$APPDIR\runtime\" -Recurse -Force
          Remove-Item "runtime-download" -Recurse -Force

          & "$APPDIR\runtime\bin\java.exe" -version

      - name: Download Windows JavaFX SDK
        shell: pwsh
        run: |
          $APPDIR = "EchoLauncher-Windows"

          New-Item -ItemType Directory -Force -Path "javafx-download" | Out-Null
          $javafxZip = "javafx-download\javafx.zip"

          Invoke-WebRequest `
            -Uri "https://download2.gluonhq.com/openjfx/21.0.2/openjfx-21.0.2_windows-x64_bin-sdk.zip" `
            -OutFile $javafxZip

          Expand-Archive -Path $javafxZip -DestinationPath "javafx-download\extracted" -Force
          $sdk = Get-ChildItem "javafx-download\extracted" | Select-Object -First 1

          New-Item -ItemType Directory -Force -Path "$APPDIR\javafx\lib" | Out-Null
          New-Item -ItemType Directory -Force -Path "$APPDIR\javafx\bin" | Out-Null

          Copy-Item "$($sdk.FullName)\lib\*" "$APPDIR\javafx\lib\" -Recurse -Force

          if (Test-Path "$($sdk.FullName)\bin") {
            Copy-Item "$($sdk.FullName)\bin\*" "$APPDIR\javafx\bin\" -Recurse -Force
          }

          Remove-Item "javafx-download" -Recurse -Force

      - name: Add Windows icon
        shell: pwsh
        run: |
          $APPDIR = "EchoLauncher-Windows"

          if (Test-Path "docs\readme-assets\logo.png") {
            Copy-Item "docs\readme-assets\logo.png" "$APPDIR\echo-launcher.png"
          } elseif (Test-Path "src\main\resources\icons\minecraft-launcher.png") {
            Copy-Item "src\main\resources\icons\minecraft-launcher.png" "$APPDIR\echo-launcher.png"
          }

      - name: Create Windows launcher BAT
        shell: pwsh
        run: |
          $APPDIR = "EchoLauncher-Windows"

          @'
@echo off
chcp 65001 >nul
setlocal

cd /d "%~dp0"

set "APPDIR=%~dp0"
set "JAVA=%APPDIR%runtime\bin\java.exe"
set "JAR=%APPDIR%app\Echo_Launcher.jar"
set "DEPS=%APPDIR%app\deps\*"
set "JAVAFX_LIB=%APPDIR%javafx\lib"
set "JAVAFX_BIN=%APPDIR%javafx\bin"
set "LOG=%APPDIR%launcher-startup.log"

echo Starting Echo Launcher... > "%LOG%"
echo APPDIR=%APPDIR%>> "%LOG%"
echo JAVA=%JAVA%>> "%LOG%"
echo JAR=%JAR%>> "%LOG%"
echo DEPS=%DEPS%>> "%LOG%"
echo JAVAFX_LIB=%JAVAFX_LIB%>> "%LOG%"
echo JAVAFX_BIN=%JAVAFX_BIN%>> "%LOG%"
echo.>> "%LOG%"

if not exist "%JAVA%" goto missing_java
if not exist "%JAR%" goto missing_jar
if not exist "%JAVAFX_LIB%" goto missing_javafx_lib
if not exist "%JAVAFX_BIN%" goto missing_javafx_bin

set "PATH=%JAVAFX_BIN%;%PATH%"

echo Java version:>> "%LOG%"
"%JAVA%" -version >> "%LOG%" 2>&1
echo.>> "%LOG%"

echo Running command...>> "%LOG%"
echo "%JAVA%" --module-path "%JAVAFX_LIB%" --add-modules javafx.controls,javafx.fxml,javafx.web -Djava.library.path="%JAVAFX_BIN%" -cp "%JAR%;%DEPS%" launcher.Main>> "%LOG%"
echo.>> "%LOG%"

"%JAVA%" ^
  --module-path "%JAVAFX_LIB%" ^
  --add-modules javafx.controls,javafx.fxml,javafx.web ^
  -Djava.library.path="%JAVAFX_BIN%" ^
  -cp "%JAR%;%DEPS%" ^
  launcher.Main >> "%LOG%" 2>&1

set "EXITCODE=%ERRORLEVEL%"

echo.>> "%LOG%"
echo Exit code: %EXITCODE%>> "%LOG%"

if not "%EXITCODE%"=="0" goto failed
exit /b 0

:missing_java
echo Java runtime not found.>> "%LOG%"
echo Expected: %JAVA%>> "%LOG%"
echo Java runtime not found.
echo Expected: %JAVA%
pause
exit /b 1

:missing_jar
echo Launcher jar not found.>> "%LOG%"
echo Expected: %JAR%>> "%LOG%"
echo Launcher jar not found.
echo Expected: %JAR%
pause
exit /b 1

:missing_javafx_lib
echo JavaFX lib folder not found.>> "%LOG%"
echo Expected: %JAVAFX_LIB%>> "%LOG%"
echo JavaFX lib folder not found.
echo Expected: %JAVAFX_LIB%
pause
exit /b 1

:missing_javafx_bin
echo JavaFX bin folder not found.>> "%LOG%"
echo Expected: %JAVAFX_BIN%>> "%LOG%"
echo JavaFX bin folder not found.
echo Expected: %JAVAFX_BIN%
pause
exit /b 1

:failed
echo.
echo Echo Launcher failed. Check launcher-startup.log
echo.
type "%LOG%"
pause
exit /b %EXITCODE%

endlocal
'@ | Out-File -FilePath "$APPDIR\EchoLauncher.bat" -Encoding ASCII

      - name: Create Windows silent launcher
        shell: pwsh
        run: |
          $APPDIR = "EchoLauncher-Windows"

          @'
Set WshShell = CreateObject("WScript.Shell")
WshShell.Run chr(34) & CreateObject("Scripting.FileSystemObject").GetParentFolderName(WScript.ScriptFullName) & "\EchoLauncher.bat" & chr(34), 0
Set WshShell = Nothing
'@ | Out-File -FilePath "$APPDIR\EchoLauncher.vbs" -Encoding ASCII

      - name: Zip Windows portable package
        shell: pwsh
        run: |
          Compress-Archive -Path "EchoLauncher-Windows" -DestinationPath "Echo_Launcher-windows-x64.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Echo_Launcher_Windows_Portable
          path: Echo_Launcher-windows-x64.zip

  build-macos-app:
    name: Build macOS App ZIP
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build project
        run: |
          if [ -f "pom.xml" ]; then
            mvn clean package -DskipTests
            mvn dependency:copy-dependencies -DincludeScope=runtime -DoutputDirectory=target/dependency
          elif [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew build
          else
            echo "No pom.xml or gradlew found."
            exit 1
          fi

      - name: Locate launcher jar
        id: locate_jar
        run: |
          JAR_FILE=$(find . -type f -name "*.jar" \
            ! -path "./target/dependency/*" \
            ! -name "*sources*" \
            ! -name "*javadoc*" \
            ! -name "*original*" \
            | head -n 1)

          if [ -z "$JAR_FILE" ]; then
            echo "No launcher jar found."
            exit 1
          fi

          echo "Found jar: $JAR_FILE"
          echo "jar_file=$JAR_FILE" >> "$GITHUB_OUTPUT"

      - name: Prepare macOS .app structure
        run: |
          APP="Echo Launcher.app"

          rm -rf "$APP"

          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources/app"
          mkdir -p "$APP/Contents/Resources/app/deps"
          mkdir -p "$APP/Contents/Resources/runtime"
          mkdir -p "$APP/Contents/Resources/javafx"

          cp "${{ steps.locate_jar.outputs.jar_file }}" "$APP/Contents/Resources/app/Echo_Launcher.jar"

          if [ -d "target/dependency" ]; then
            cp target/dependency/*.jar "$APP/Contents/Resources/app/deps/" || true
          fi

          if [ -d "build/libs" ]; then
            find build/libs -type f -name "*.jar" \
              ! -name "*sources*" \
              ! -name "*javadoc*" \
              -exec cp {} "$APP/Contents/Resources/app/deps/" \; || true
          fi

      - name: Download macOS Java Runtime
        run: |
          APP="Echo Launcher.app"

          mkdir -p runtime-download
          wget -O runtime-download/runtime.tar.gz \
            "https://api.adoptium.net/v3/binary/latest/21/ga/mac/x64/jre/hotspot/normal/eclipse"

          mkdir -p runtime-download/extracted
          tar -xf runtime-download/runtime.tar.gz -C runtime-download/extracted
          ROOT=$(find runtime-download/extracted -mindepth 1 -maxdepth 1 -type d | head -n 1)
          cp -R "$ROOT/"* "$APP/Contents/Resources/runtime/"
          rm -rf runtime-download

          if [ -x "$APP/Contents/Resources/runtime/Contents/Home/bin/java" ]; then
            "$APP/Contents/Resources/runtime/Contents/Home/bin/java" -version
          else
            "$APP/Contents/Resources/runtime/bin/java" -version
          fi

      - name: Download macOS JavaFX SDK
        run: |
          APP="Echo Launcher.app"

          mkdir -p javafx-download
          wget -O javafx-download/javafx.zip \
            "https://download2.gluonhq.com/openjfx/21.0.2/openjfx-21.0.2_osx-x64_bin-sdk.zip"

          unzip javafx-download/javafx.zip -d javafx-download
          cp -R javafx-download/javafx-sdk-21.0.2/lib "$APP/Contents/Resources/javafx/lib"
          rm -rf javafx-download

      - name: Add macOS icon resources
        run: |
          APP="Echo Launcher.app"

          if [ -f "docs/readme-assets/logo.png" ]; then
            cp docs/readme-assets/logo.png "$APP/Contents/Resources/echo-launcher.png"
          elif [ -f "src/main/resources/icons/minecraft-launcher.png" ]; then
            cp src/main/resources/icons/minecraft-launcher.png "$APP/Contents/Resources/echo-launcher.png"
          fi

      - name: Create macOS launcher executable
        run: |
          APP="Echo Launcher.app"

          cat > "$APP/Contents/MacOS/EchoLauncher" << 'EOF'
#!/bin/bash
APPDIR="$(cd "$(dirname "$0")/.." && pwd)"
RES="$APPDIR/Resources"

if [ -x "$RES/runtime/Contents/Home/bin/java" ]; then
  JAVA="$RES/runtime/Contents/Home/bin/java"
else
  JAVA="$RES/runtime/bin/java"
fi

JAR="$RES/app/Echo_Launcher.jar"
DEPS="$RES/app/deps/*"
JAVAFX="$RES/javafx/lib"

exec "$JAVA" \
  -XstartOnFirstThread \
  --module-path "$JAVAFX" \
  --add-modules javafx.controls,javafx.fxml,javafx.web \
  -cp "$JAR:$DEPS" \
  launcher.Main "$@"
EOF

          chmod +x "$APP/Contents/MacOS/EchoLauncher"

      - name: Create macOS Info.plist
        run: |
          APP="Echo Launcher.app"

          cat > "$APP/Contents/Info.plist" << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>CFBundleName</key>
  <string>Echo Launcher</string>
  <key>CFBundleDisplayName</key>
  <string>Echo Launcher</string>
  <key>CFBundleIdentifier</key>
  <string>com.echo.launcher</string>
  <key>CFBundleVersion</key>
  <string>1.0.0</string>
  <key>CFBundleShortVersionString</key>
  <string>1.0.0</string>
  <key>CFBundleExecutable</key>
  <string>EchoLauncher</string>
  <key>CFBundlePackageType</key>
  <string>APPL</string>
  <key>LSMinimumSystemVersion</key>
  <string>10.13</string>
  <key>NSHighResolutionCapable</key>
  <true/>
</dict>
</plist>
EOF

      - name: Zip macOS app
        run: |
          zip -r "Echo_Launcher-macos-x64.zip" "Echo Launcher.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Echo_Launcher_macOS_App
          path: Echo_Launcher-macos-x64.zip

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs:
      - build-linux-appimage
      - build-windows-portable
      - build-macos-app

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: |
          find dist -type f -maxdepth 2 -print

      - name: Determine release tag
        id: release_tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ github.event.inputs.version }}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using release tag: $TAG"

      - name: Generate release notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
# Echo Launcher Release

Thank you for using **Echo Launcher**.

## Downloads

Choose the package for your platform:

| Platform | File |
|---|---|
| Linux | `Echo_Launcher-linux-x86_64.AppImage` |
| Windows | `Echo_Launcher-windows-x64.zip` |
| macOS | `Echo_Launcher-macos-x64.zip` |

## Installation

### Linux

```bash
chmod +x Echo_Launcher-linux-x86_64.AppImage
./Echo_Launcher-linux-x86_64.AppImage
```

### Windows

1. Download `Echo_Launcher-windows-x64.zip`.
2. Extract it.
3. Run `EchoLauncher.bat`.
4. If there is an issue, check `launcher-startup.log`.

### macOS

1. Download `Echo_Launcher-macos-x64.zip`.
2. Extract it.
3. Open `Echo Launcher.app`.
4. If macOS blocks it, run:

```bash
xattr -dr com.apple.quarantine "Echo Launcher.app"
```

## Highlights

- Prism-like instance system.
- Modrinth and CurseForge support.
- Mods, shaders, resource packs, and modpacks.
- Custom client jar support.
- JVM arguments per instance.
- Java runtime auto-management.
- Fabric installer with loader selection.
- Pre-launch checker and crash analyzer.
- World and screenshot managers.

## Notes

- CurseForge requires a valid API Key configured in settings.
- Some CurseForge files may block third-party downloads.
- This project is in active development.
EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Echo Launcher ${{ steps.release_tag.outputs.tag }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ github.event.inputs.prerelease || false }}
          files: |
            dist/Echo_Launcher-linux-x86_64.AppImage
            dist/Echo_Launcher-windows-x64.zip
            dist/Echo_Launcher-macos-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
